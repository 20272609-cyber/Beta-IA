<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IA Beta Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f0f0f; color: #e5e7eb; font-family: sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 16px; }
        .sidebar { background-color: #161616; border-right: 1px solid #262626; }
    </style>
</head>
<body class="flex h-screen">
    <aside class="sidebar w-64 p-4 hidden md:flex flex-col">
        <h2 class="text-xl font-bold mb-6 flex items-center gap-2">🌸 Beta AI</h2>
        <button class="bg-[#262626] hover:bg-[#333] py-2 rounded-lg text-sm mb-4">+ Nuevo Chat</button>
        <div class="flex-1 text-xs text-gray-500 font-bold uppercase">Recientes</div>
    </aside>

    <main class="flex-1 flex flex-col items-center justify-center p-6">
        <div class="text-center mb-10">
            <h1 class="text-5xl font-bold mb-2">Hola,</h1>
            <p class="text-2xl text-gray-500">¿En qué puedo ayudarte hoy?</p>
        </div>

        <div class="w-full max-w-3xl glass p-4 shadow-2xl">
            <div class="flex gap-2 mb-4 overflow-x-auto pb-2">
                <span class="bg-purple-900/30 text-purple-400 border border-purple-500/50 px-3 py-1 rounded-full text-xs cursor-pointer">Gemini 2.5</span>
                <span class="bg-gray-800 text-gray-400 px-3 py-1 rounded-full text-xs cursor-pointer">Grok-3</span>
                <span class="bg-gray-800 text-gray-400 px-3 py-1 rounded-full text-xs cursor-pointer">Claude 4</span>
            </div>

            <textarea class="w-full bg-transparent border-none outline-none text-white text-lg resize-none" placeholder="Pregunta lo que quieras..." rows="3"></textarea>
            
            <div class="flex justify-between items-center mt-4 border-t border-gray-800 pt-4">
                <div class="flex gap-4 text-gray-400"><span>📎</span><span>🌐</span></div>
                <button class="bg-white text-black px-6 py-2 rounded-full font-bold hover:bg-gray-200 transition">Enviar</button>
            </div>
        </div>
    </main>
</body>
</html>
